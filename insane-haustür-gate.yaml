# ==============================================================================
# INSANE HAUSTÜR GATE v2.2
# ==============================================================================

substitutions:
  # Status-Nachrichten (Magic Strings)
  txt_ready: "Bereit"
  txt_scanning: "Scanne..."
  txt_access_granted: "Zugang gewährt"
  txt_unknown_name: "Unbekannt (Kein Name)"
  txt_finger_unknown: "Finger unbekannt"
  txt_finger_misplaced: "Finger falsch aufgelegt"
  txt_scan_invalid: "Scan fehlerhaft"
  txt_success: "Erfolgreich!"
  txt_error_aborted: "Abgebrochen/Fehler"
  txt_learn_active: "Aktiv - Karte auflegen..."
  txt_db_deleted: "Datenbank gelöscht!"
  txt_scan_ok: "Scan %d von 2 ok..."
  txt_enroll_prompt: "ID %d: Bitte 2x auflegen..."
  txt_loading_data: "Lade Daten..."
  txt_fingerprint_usage: "%d von 200 belegt"

esphome:
  name: "haustur-gate"
  friendly_name: Haustür Gate
  on_boot:
    priority: -10
    then:
      - script.execute: led_party
      - output.set_level:
          id: blue_led_output
          level: 100%

esp32:
  board: esp32dev
  framework:
    type: esp-idf
  variant: esp32

external_components:
  - source:
      type: git
      url: https://github.com/babeinlovexd/insane_package_report
    components: [ insane_package_report ]
    refresh: 1s

insane_package_report:

# ==============================================================================
# GLOBALE VARIABLEN
# ==============================================================================
globals:
  # Master-Karte zum Aktivieren des Anlernmodus
  - id: master_tag_uid
    type: std::string
    initial_value: !secret master_tag_id

  # Speichert die erlaubten NFC-IDs
  - id: whitelist_str
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'

  # System-Status Flags
  - id: learn_mode
    type: bool
    initial_value: 'false'
  
  - id: was_offline
    type: bool
    initial_value: 'false'

  - id: temp_enroll_id
    type: int
    initial_value: "1"

  # --- FINGERPRINT NAMEN (Verdoppelt) ---
  - id: finger_names_str_1
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'

  - id: finger_names_str_2
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'

  # --- NFC NAMEN (Verdoppelt) ---
  - id: nfc_names_str_1
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'

  - id: nfc_names_str_2
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'

# ==============================================================================
# NETZWERK & API
# ==============================================================================
api:
  homeassistant_services: true
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Haustur-Gate Fallback"
    password: !secret ap_password

logger:
captive_portal:

# ==============================================================================
# BUS SYSTEME
# ==============================================================================
uart:
  - id: uart_fingerprint
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 57600

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# ==============================================================================
# HAUPTLOGIK: FINGERABDRUCK (R503)
# ==============================================================================
fingerprint_grow:
  id: r503
  uart_id: uart_fingerprint
  update_interval: 1s
  sensing_pin: GPIO33

  # --- Scan Vorgang ---
  on_finger_scan_start:
    - fingerprint_grow.aura_led_control:
        state: ALWAYS_ON
        color: YELLOW
        speed: 0
        count: 1
    - lambda: 'id(finger_status).publish_state("${txt_scanning}");'
    - delay: 2s 
    - script.execute: led_idle
  
  # --- Ergebnis: Treffer ---
  on_finger_scan_matched:
    - lambda: |-
        id(finger_status).publish_state("${txt_access_granted} (ID: " + to_string(finger_id) + ")");
        id(haustuerzugang).publish_state(true);

        // Beide Strings zusammenfügen für die Suche:
        std::string names = id(finger_names_str_1) + id(finger_names_str_2);

        char search_buf[32];
        sprintf(search_buf, "%d=", finger_id);
        std::string search_str = search_buf;
        size_t pos = names.find(search_str);

        bool found = false;
        while (pos != std::string::npos) {
            if (pos == 0 || names[pos - 1] == ';') {
                pos += search_str.length();
                size_t end_pos = names.find(";", pos);
                if (end_pos != std::string::npos) {
                    std::string found_name = names.substr(pos, end_pos - pos);
                    id(last_access_name).publish_state(found_name);
                    found = true;
                    break;
                }
            }
            pos = names.find(search_str, pos + 1);
        }

        if (!found) {
            id(last_access_name).publish_state("${txt_unknown_name}");
        }
    - script.execute: led_success
    - script.execute: beep_done
    - delay: 2s
    - lambda: |-
        id(finger_status).publish_state("${txt_ready}");
        id(haustuerzugang).publish_state(false);
  
  # --- Ergebnis: Kein Treffer ---
  on_finger_scan_unmatched:
    - lambda: 'id(finger_status).publish_state("${txt_finger_unknown}");'
    - script.execute: led_error
    - script.execute: beep_error
    - delay: 5s
    - lambda: 'id(finger_status).publish_state("${txt_ready}");'

  on_finger_scan_misplaced:
    - lambda: 'id(finger_status).publish_state("${txt_finger_misplaced}");'
    - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 25, color: YELLOW, count: 3}
    - script.execute: beep_error
    - delay: 2s
    - lambda: 'id(finger_status).publish_state("${txt_ready}");'
    - script.execute: led_idle

  on_finger_scan_invalid:
    - lambda: 'id(finger_status).publish_state("${txt_scan_invalid}");'
    - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 25, color: YELLOW, count: 3}
    - script.execute: beep_error
    - delay: 3s
    - lambda: 'id(finger_status).publish_state("${txt_ready}");'
    - script.execute: led_idle

  # --- Anlern-Prozess ---
  on_enrollment_scan:
    - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 25, color: GREEN, count: 1}
    - script.execute: beep_success
    - lambda: |-
        char buf[32];
        sprintf(buf, "${txt_scan_ok}", scan_num);
        id(finger_status).publish_state(buf);

  on_enrollment_done:
    - script.execute: led_party
    - script.execute: beep_success
    - lambda: |-
        id(finger_status).publish_state("${txt_success}");
        std::string name = id(input_new_name).state;
        if (!name.empty()) {
          std::replace(name.begin(), name.end(), '=', '_');
          std::replace(name.begin(), name.end(), ';', '_');

          std::string entry = std::to_string(id(temp_enroll_id)) + "=" + name + ";";

          // Speichermanagement:
          if (id(finger_names_str_1).length() + entry.length() <= 250) {
            id(finger_names_str_1) += entry;
          } else if (id(finger_names_str_2).length() + entry.length() <= 250) {
            id(finger_names_str_2) += entry;
          } else {
            ESP_LOGE("finger", "Speicher voll!");
          }

          id(input_new_name).publish_state("");
        }
    - delay: 3s
    - lambda: 'id(finger_status).publish_state("${txt_ready}");'

  on_enrollment_failed:
    - script.execute: led_error
    - script.execute: beep_error
    - lambda: 'id(finger_status).publish_state("${txt_error_aborted}");'
    - delay: 2s
    - lambda: 'id(finger_status).publish_state("${txt_ready}");'

# ==============================================================================
# HAUPTLOGIK: NFC READER (PN532)
# ==============================================================================
pn532_spi:
  cs_pin: GPIO5
  update_interval: 1s
  on_tag:
    then:
      - lambda: |-
          // UID lesen
          std::string current_uid = "";
          for (size_t i = 0; i < tag.get_uid().size(); i++) {
              char buf[3];
              sprintf(buf, "%02X", tag.get_uid()[i]);
              current_uid += buf;
              if (i < tag.get_uid().size() - 1) current_uid += "-";
          }
          
          // Master-Karte Check
          if (current_uid == id(master_tag_uid)) {
            id(learn_mode) = !id(learn_mode);
            if (id(learn_mode)) {
              id(beep_success).execute();
              id(led_setup).execute();
              id(learn_mode_timeout).execute(); 
            } else {
              id(learn_mode_timeout).stop();
              id(beep_error).execute();
              id(led_error).execute();
            }
            id(learn_status).publish_state(id(learn_mode) ? "${txt_learn_active}" : "${txt_ready}");
            return;
          }

          // Lernmodus: Neue Karte speichern
          if (id(learn_mode)) {
            std::string search_str = "," + current_uid + ",";
            std::string whitelist_padded = "," + id(whitelist_str) + ",";
            if (whitelist_padded.find(search_str) == std::string::npos) {
              if (!id(whitelist_str).empty()) id(whitelist_str) += ",";
              id(whitelist_str) += current_uid;
              std::string name = id(input_new_name).state;
              if (!name.empty()) {
                std::replace(name.begin(), name.end(), '=', '_');
                std::replace(name.begin(), name.end(), ';', '_');

                std::string entry = current_uid + "=" + name + ";";

                if (id(nfc_names_str_1).length() + entry.length() <= 250) {
                  id(nfc_names_str_1) += entry;
                } else if (id(nfc_names_str_2).length() + entry.length() <= 250) {
                  id(nfc_names_str_2) += entry;
                } else {
                  ESP_LOGE("nfc", "Speicher voll!");
                }

                id(input_new_name).publish_state("");
              }
              id(beep_success).execute();
              id(led_party).execute();
              id(whitelist_display).update();
              id(whitelist_count).update();
            } else {
              id(beep_error).execute();
              id(led_error).execute();
            }
            id(learn_mode) = false;
            id(learn_status).publish_state("${txt_ready}");
            id(learn_mode_timeout).stop();
            return;
          }

          // Normalbetrieb: Zugangsprüfung
          std::string search_str = "," + current_uid + ",";
          std::string whitelist_padded = "," + id(whitelist_str) + ",";
          if (whitelist_padded.find(search_str) != std::string::npos) {
            ESP_LOGI("nfc_gate", "Zugriff gewährt: %s", current_uid.c_str());
            id(haustuerzugang).publish_state(true);

            // Beide Strings für die Suche zusammenfügen:
            std::string names = id(nfc_names_str_1) + id(nfc_names_str_2);
            std::string name_search = current_uid + "=";
            size_t pos = names.find(name_search);

            bool found = false;
            while (pos != std::string::npos) {
                if (pos == 0 || names[pos - 1] == ';') {
                    pos += name_search.length();
                    size_t end_pos = names.find(";", pos);
                    if (end_pos != std::string::npos) {
                        std::string found_name = names.substr(pos, end_pos - pos);
                        id(last_access_name).publish_state(found_name);
                        found = true;
                        break;
                    }
                }
                pos = names.find(name_search, pos + 1);
            }

            if (!found) {
                id(last_access_name).publish_state("${txt_unknown_name}");
            }

            id(beep_success).execute();
            id(led_success).execute();
            
            App.scheduler.set_timeout(id(haustuerzugang), "auto_close", 2000, []() {
                id(haustuerzugang).publish_state(false);
            });
          } else {
            ESP_LOGW("nfc_gate", "Zugriff verweigert: %s", current_uid.c_str());
            id(beep_error).execute();
            id(led_error).execute();
            id(haustuerzugang).publish_state(false);
          }

# ==============================================================================
# SENSOREN & EINGÄNGE
# ==============================================================================
sensor:
  - platform: fingerprint_grow
    fingerprint_count:
      name: "Gespeicherte Finger"
      id: finger_count_val
    last_finger_id:
      name: "Letzte Finger ID"
    last_confidence:
      name: "Letztes Vertrauenslevel"

  - platform: dht
    pin: GPIO4
    model: DHT22
    temperature:
      name: "Außen Temperatur"
      id: raw_temp
      filters:
        - sliding_window_moving_average: {window_size: 5, send_every: 1}
        - lambda: return x + id(temp_offset).state;
    humidity:
      name: "Außen Luftfeuchtigkeit"
      id: raw_hum
      filters:
        - sliding_window_moving_average: {window_size: 5, send_every: 1}
        - lambda: return x + id(hum_offset).state;
    update_interval: 60s

  - platform: template
    name: "NFC Speicher"
    entity_category: "diagnostic"
    id: whitelist_count
    icon: "mdi:account-group"
    lambda: |-
      const std::string &s = id(whitelist_str);
      if (s.empty()) return 0.0f;
      int commas = std::count(s.begin(), s.end(), ',');
      return (float)(commas + 1);
    update_interval: 30s

binary_sensor:
  - platform: template
    name: "Haustürzugang"
    id: haustuerzugang
    device_class: lock

  - platform: status
    name: "Hautür Gate Status"
    id: system_status

  # --- Haustür Kontakt (Reed) ---
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLUP
      inverted: false # Standard für Reed: Geschlossen = GND
    name: "Haustür Kontakt"
    id: door_contact
    device_class: door
    filters:
      - delayed_on: 100ms # Entprellung gegen Wind/Klappern
      - delayed_off: 100ms

  # --- Virtueller Status für Home Assistant Automationen ---
  - platform: template
    name: "Insane Türklingel Status"
    id: virtual_doorbell_status

  # --- Physischer Hardware-Pin ---
  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    name: "Türklingel Hardware"
    id: doorbell_sensor
    internal: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - logger.log: "Klingel gedrückt!"
        - button.press: trigger_doorbell

# ==============================================================================
# TEXT & STATUS
# ==============================================================================
text:
  - platform: template
    name: "Name für neuen Zugang"
    id: input_new_name
    optimistic: true
    min_length: 0
    max_length: 32
    mode: text

text_sensor:
  - platform: template
    name: "Letzter Zugang"
    id: last_access_name
    icon: "mdi:account-check"

  - platform: template
    name: "Finger DB 1"
    entity_category: "diagnostic"
    id: display_finger_db1
    lambda: 'return id(finger_names_str_1);'

  - platform: template
    name: "Finger DB 2"
    entity_category: "diagnostic"
    id: display_finger_db2
    lambda: 'return id(finger_names_str_2);'

  - platform: template
    name: "NFC DB 1"
    entity_category: "diagnostic"
    id: display_nfc_db1
    lambda: 'return id(nfc_names_str_1);'

  - platform: template
    name: "NFC DB 2"
    entity_category: "diagnostic"
    id: display_nfc_db2
    lambda: 'return id(nfc_names_str_2);'

  - platform: template
    name: "Gespeicherte UIDs"
    entity_category: "diagnostic"
    id: whitelist_display
    lambda: 'return id(whitelist_str);'

  - platform: template
    name: "NFC Status"
    id: learn_status
    icon: "mdi:school"
    lambda: |-
      if (id(learn_mode)) return {"${txt_learn_active}"};
      return {"${txt_ready}"};

  - platform: template
    name: "Fingerprint Status" 
    id: finger_status
    icon: "mdi:fingerprint"
    lambda: |-
      if (id(finger_status).state.empty()) return {"${txt_ready}"};
      return {};

  - platform: template
    name: "Fingerprint Speicher"
    entity_category: "diagnostic"
    id: fingerprint_usage
    icon: "mdi:memory"
    update_interval: 30s
    lambda: |-
      if (!id(finger_count_val).has_state()) return {"${txt_loading_data}"};
      int count = (int)id(finger_count_val).state;
      char buf[64];
      sprintf(buf, "${txt_fingerprint_usage}", count);
      return {buf};

# ==============================================================================
# AUSGÄNGE & SCHALTER
# ==============================================================================
output:
  - platform: ledc
    pin: GPIO2
    id: buzzer_output
    inverted: true # WICHTIG für PNP Transistor! (ON = LOW = Transistor leitet)

  - platform: ledc
    pin: GPIO27
    id: blue_led_output
    frequency: 1000Hz

light:
  - platform: monochromatic
    name: "Gehäuse LED Helligkeit"
    id: blue_led_dimmer
    output: blue_led_output
    icon: "mdi:brightness-6"
    default_transition_length: 500ms # Sanftes Ein-/Ausblenden
    restore_mode: ALWAYS_ON # Startet nach dem Booten direkt

switch:
  - platform: output
    name: "Haustür Summer Test"
    entity_category: config
    output: buzzer_output
    id: door_buzzer_test
    icon: "mdi:bullhorn"

  - platform: template
    name: "Standby LED"
    id: standby_led_switch
    icon: "mdi:led-on"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON 
    on_turn_on:
      - script.execute: led_idle
    on_turn_off:
      - script.execute: led_idle

# ==============================================================================
# SKRIPTE & EFFEKTE
# ==============================================================================
script:
  # --- Klingel Effekt (Blaues Atmen) ---
  - id: led_doorbell_effect
    then:
      - fingerprint_grow.aura_led_control:
          state: BREATHING
          speed: 150
          color: BLUE
          count: 3
      - delay: 3s
      - script.execute: led_idle

  # --- Sound ---
  - id: beep_success
    mode: restart
    then:
      - output.turn_on: buzzer_output
      - delay: 150ms
      - output.turn_off: buzzer_output

  - id: beep_done
    mode: restart
    then:
      - output.turn_on: buzzer_output
      - delay: 150ms
      - output.turn_off: buzzer_output
      - delay: 150ms
      - output.turn_on: buzzer_output
      - delay: 150ms
      - output.turn_off: buzzer_output

  - id: beep_error
    mode: restart
    then:
      - output.turn_on: buzzer_output
      - delay: 800ms
      - output.turn_off: buzzer_output

  # --- LED Muster ---
  - id: led_idle
    then:
      - if:
          condition:
            switch.is_on: standby_led_switch
          then:
            # Schalter ist AN -> Blaues Licht
            - fingerprint_grow.aura_led_control:
                state: ALWAYS_ON
                speed: 0
                color: BLUE
                count: 0
          else:
            # Schalter ist AUS -> Licht komplett aus
            - fingerprint_grow.aura_led_control:
                state: ALWAYS_OFF
                speed: 0
                color: BLUE 
                count: 0

  - id: led_success
    then:
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 25, color: GREEN, count: 3}
      - delay: 2s
      - script.execute: led_idle

  - id: led_error
    then:
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 25, color: RED, count: 3}
      - delay: 2s
      - script.execute: led_idle

  - id: led_warning
    then:
      - fingerprint_grow.aura_led_control: {state: ALWAYS_ON, color: YELLOW, speed: 0, count: 1}
      - delay: 2s
      - script.execute: led_idle

  - id: led_setup
    then:
      - fingerprint_grow.aura_led_control: {state: BREATHING, speed: 60, color: PURPLE, count: 0}

  - id: led_party
    then:
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: RED, count: 1}
      - delay: 150ms
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: GREEN, count: 1}
      - delay: 150ms
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: BLUE, count: 1}
      - delay: 150ms
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: PURPLE, count: 1}
      - delay: 150ms
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: CYAN, count: 1}
      - delay: 150ms
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: YELLOW, count: 1}
      - delay: 150ms
      - fingerprint_grow.aura_led_control: {state: FLASHING, speed: 50, color: WHITE, count: 1}
      - delay: 500ms
      - script.execute: led_idle

  - id: learn_mode_timeout
    mode: restart 
    then:
      - delay: 30s
      - if:
          condition: { lambda: 'return id(learn_mode);' }
          then:
            - globals.set: { id: learn_mode, value: 'false' }
            - lambda: 'id(learn_status).publish_state("${txt_ready}");'
            - script.execute: beep_error
            - script.execute: led_idle

# ==============================================================================
# HELPER BUTTONS (DASHBOARD)
# ==============================================================================
number:
  - platform: template
    name: "Temp Offset"
    entity_category: config
    id: temp_offset
    optimistic: true
    min_value: -10
    max_value: 10
    step: 0.1
    restore_value: yes
    initial_value: 0.0
  
  - platform: template
    name: "Hum Offset"
    entity_category: config
    id: hum_offset
    optimistic: true
    min_value: -20
    max_value: 20
    step: 1
    restore_value: yes
    initial_value: 0

button:
  - platform: template
    name: "NFC Datenbank Löschen"
    id: whitelist_delete_button
    icon: "mdi:card-remove"
    entity_category: config 
    on_press:
      - globals.set: { id: whitelist_str, value: '""' }
      - globals.set: { id: nfc_names_str_1, value: '""' }
      - globals.set: { id: nfc_names_str_2, value: '""' }
      - lambda: 'id(whitelist_display).update(); id(whitelist_count).update();'
      - script.execute: beep_error

  - platform: template
    name: "NFC anlernen"
    id: learn_mode_button
    icon: "mdi:tag-plus"
    on_press:
      - globals.set: { id: learn_mode, value: 'true' }
      - script.execute: led_setup
      - script.execute: learn_mode_timeout
      - component.update: learn_status 

  - platform: template
    name: "Finger anlernen "
    id: enroll_finger_button
    icon: "mdi:fingerprint"
    on_press:
      then:
        - fingerprint_grow.aura_led_control: {state: ALWAYS_ON, color: PURPLE, speed: 0, count: 0}
        # Schritt A: ID berechnen und Text anzeigen
        - lambda: |-
            int next_id = 1;
            if (id(finger_count_val).has_state()) {
              next_id = (int)id(finger_count_val).state + 1;
            }
            id(temp_enroll_id) = next_id; // In globaler Variable speichern
            
            char buf[64];
            sprintf(buf, "${txt_enroll_prompt}", next_id);
            id(finger_status).publish_state(buf);

        # Schritt B:ESPHome-Action starten
        - fingerprint_grow.enroll:
            finger_id: !lambda "return id(temp_enroll_id);"
            num_scans: 2

  - platform: template
    name: "Türklingel"
    id: trigger_doorbell
    icon: "mdi:bell-ring"
    on_press:
      then:
        - script.execute: led_doorbell_effect
        - logger.log: "Türklingel ausgelöst"
        - binary_sensor.template.publish:
            id: virtual_doorbell_status
            state: ON
        - delay: 1s
        - binary_sensor.template.publish:
            id: virtual_doorbell_status
            state: OFF

  - platform: template
    name: "Finger Datenbank löschen"
    id: delete_all_fingerprints
    icon: "mdi:fingerprint-off"
    entity_category: config 
    on_press:
      then:
        - fingerprint_grow.delete_all: 
        - globals.set: { id: finger_names_str_1, value: '""' }
        - globals.set: { id: finger_names_str_2, value: '""' }
        - lambda: |-
            id(finger_status).publish_state("${txt_db_deleted}");
            id(finger_count_val).publish_state(0);
        - script.execute: beep_error
        - delay: 3s
        - script.execute: led_idle
        - lambda: 'id(finger_status).publish_state("${txt_ready}");'

# ==============================================================================
# WATCHDOG
# ==============================================================================
interval:
- interval: 10s
  then:
    - if:
        condition:
          not:
            wifi.connected:
        then:
          - fingerprint_grow.aura_led_control: {state: ALWAYS_ON, speed: 0, color: RED, count: 0}
          - globals.set: {id: was_offline, value: 'true'}
        else:
          - if:
              condition: { lambda: 'return id(was_offline);' }
              then:
                - script.execute: led_idle
                - globals.set: {id: was_offline, value: 'false'}